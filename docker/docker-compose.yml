version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: studylab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: studylab
      POSTGRES_USER: studylab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studylab_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studylab"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Gitea Git Server (for Git labs) ──────────────────────
  gitea:
    image: gitea/gitea:1.22-rootless
    container_name: studylab-git
    restart: unless-stopped
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__HTTP_PORT: "3001"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
    ports:
      - "3001:3001"
      - "2222:2222"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea

  # ── Lab Engine (FastAPI) ─────────────────────────────────
  lab-engine:
    build:
      context: ../services/lab-engine
      dockerfile: Dockerfile
    container_name: studylab-labs
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://studylab:${POSTGRES_PASSWORD:-studylab_dev_2024}@postgres:5432/studylab
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "8100:8100"
    volumes:
      - ../services/lab-engine:/app
      - ../labs:/labs:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Mock Meraki Dashboard API ────────────────────────────
  mock-meraki:
    build:
      context: ../services/lab-engine
      dockerfile: Dockerfile
    container_name: studylab-meraki
    command: uvicorn mock_apis.meraki.app:app --host 0.0.0.0 --port 8201
    ports:
      - "8201:8201"
    volumes:
      - ../services/lab-engine:/app

  # ── Mock Catalyst Center API ─────────────────────────────
  mock-catalyst:
    build:
      context: ../services/lab-engine
      dockerfile: Dockerfile
    container_name: studylab-catalyst
    command: uvicorn mock_apis.catalyst.app:app --host 0.0.0.0 --port 8202
    ports:
      - "8202:8202"
    volumes:
      - ../services/lab-engine:/app

  # ── Mock Webex API ───────────────────────────────────────
  mock-webex:
    build:
      context: ../services/lab-engine
      dockerfile: Dockerfile
    container_name: studylab-webex
    command: uvicorn mock_apis.webex.app:app --host 0.0.0.0 --port 8203
    ports:
      - "8203:8203"
    volumes:
      - ../services/lab-engine:/app

volumes:
  pgdata:
  gitea-data:
  gitea-config:
